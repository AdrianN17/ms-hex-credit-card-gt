components:
  schemas:
    CardRequest:
      type: object
      properties:
        typeCard:
          type: string
          pattern: ^(VISA|MASTERCARD)$
        categoryCard:
          type: string
          pattern: ^(NORMAL|SILVER|GOLD|PLATINUM|BLACK|SIGNATURE|INFINITY)$
        benefit:
          type: object
          properties:
            hasDiscount:
              type: boolean
            multiplierPoints:
              type: number
              minimum: 0
              maximum: 1
          required:
            - hasDiscount
            - multiplierPoints
        account:
          type: object
          properties:
            creditTotal:
              type: number
              minimum: 0
              maximum: 100000
            debtTax:
              type: number
              minimum: 0
              maximum: 1
            currency:
              type: string
              pattern: ^(PEN|USD)$
            paymentDate:
              type: string
              pattern: ^(1|15|27)$
          required:
            - creditTotal
            - debtTax
            - currency
            - paymentDate
      required:
        - typeCard
        - categoryCard
        - benefit
        - account
    CardResponse:
      type: object
      properties:
        typeCard:
          type: string
          pattern: ^(VISA|MASTERCARD)$
        categoryCard:
          type: string
          pattern: ^(NORMAL|SILVER|GOLD|PLATINUM|BLACK|SIGNATURE|INFINITY)$
        benefit:
          type: object
          properties:
            hasDiscount:
              type: boolean
            multiplierPoints:
              type: number
              minimum: 0
              maximum: 1
            totalPoint:
              type: integer
          required:
            - hasDiscount
            - multiplierPoints
            - totalPoint
        balance:
          type: object
          properties:
            totalAmount:
              type: number
            oldAmount:
              type: number
            availableAmount:
              type: number
            startDate:
              type: string
              format: date
            endDate:
              type: string
              format: date
          required:
            - totalAmount
            - oldAmount
            - availableAmount
            - startDate
            - endDate
        account:
          type: object
          properties:
            creditTotal:
              type: number
              minimum: 0
              maximum: 100000
            debtTax:
              type: number
              minimum: 0
              maximum: 1
            currency:
              type: string
              pattern: ^(PEN|USD)$
            paymentDate:
              type: string
              pattern: ^(1|15|27)$
            cardStatus:
              type: string
              pattern: ^(OPERATIVA|SOBREGIRADA|DEUDOR)$
          required:
            - creditTotal
            - debtTax
            - currency
            - paymentDate
            - cardStatus
      required:
        - typeCard
        - categoryCard
        - benefit
        - balance
        - account
    PaymentRequest:
      type: object
      properties:
        channel:
          type: string
          pattern: ^(WEB|APP)$
        currency:
          type: string
          pattern: ^(PEN|USD)$
        amount:
          type: number
        category:
          type: string
          pattern: ^(MES|ADELANTADO|TOTAL)$
        pointsUsed:
          type: integer
          minimum: 0
          multipleOf: 1
          maximum: 1000
      required:
        - amount
        - currency
        - channel
        - category
    ConsumptionRequest:
      type: object
      properties:
        sellerName:
          type: string
        currency:
          type: string
          pattern: ^(PEN|USD)$
        amount:
          type: number
      required:
        - sellerName
        - currency
        - amount
    Tracking:
      type: object
      properties:
        trackingId:
          type: string
          format: uuid
        operationDate:
          type: string
          format: date-time
      required:
        - trackingId
        - operationDate
    DefaultResponse4xx:
      type: object
      properties:
        description:
          type: string
        errors:
          type: array
          items:
            type: string
      required:
        - description
        - errors
    DefaultResponse:
      type: object
      properties:
        description:
          type: string
      required:
        - description
    PaymentResponse:
      type: object
      properties:
        channel:
          type: string
          pattern: ^(WEB|APP)$
        currency:
          type: string
          pattern: ^(PEN|USD)$
        amount:
          type: number
        category:
          type: string
          pattern: ^(MES|ADELANTADO|TOTAL)$
        paymentDate:
          type: string
          format: date-time
        paymentApprobationDate:
          type: string
          format: date-time
      required:
        - amount
        - currency
        - channel
        - category
        - paymentDate
        - paymentApprobationDate
    ConsumptionResponse:
      type: object
      properties:
        sellerName:
          type: string
        currency:
          type: string
          pattern: ^(PEN|USD)$
        amount:
          type: number
        consumptionDate:
          type: string
          format: date-time
        consumptionApprobationDate:
          type: string
          format: date-time
      required:
        - sellerName
        - currency
        - amount
        - consumptionDate
        - consumptionApprobationDate
    LongResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
      required:
        - id
    UUIDResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
      required:
        - id
  responses:
    BadRequest:
      description: ''
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DefaultResponse4xx'
    NotFound:
      description: ''
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DefaultResponse'
    InternalError:
      description: ''
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DefaultResponse'
  securitySchemes: {}
servers: []
security: []
