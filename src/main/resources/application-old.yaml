server:
  port: 8081
spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=credit_card_db;encrypt=false;trustServerCertificate=true
    username: sa
    password: your_password
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  liquibase:
    change-log: classpath:db/changelog/database.yaml
    enabled: true
  data:
    mongodb:
      # Sin autenticación (local)
      uri: mongodb://localhost:27017/credit_card_db
      # Con autenticación (descomentar y quitar uri de arriba)
      host: localhost
      port: 27017
      database: credit_card_db
      username: your_user
      password: your_password
