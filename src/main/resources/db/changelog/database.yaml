# Liquibase changelog generado a partir del esquema proporcionado
# Suposiciones:
# - int -> INT AUTO_INCREMENT (primary keys marcadas como autoincrement)
# - varchar -> VARCHAR(255) por defecto
# - date -> DATE
# - datetime -> TIMESTAMP
# - number -> DECIMAL(19,2)
# - int(1) -> SMALLINT
# Ajustes: las FK se crean en changeSets separados, uno por relación.

databaseChangeLog:
  - changeSet:
      id: 002-create-cardEntities
      author: liquibase
      changes:
        - createTable:
            tableName: Cards
            columns:
              - column:
                  name: cardId
                  type: BIGINT
                  autoIncrement: false
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: typeCard
                  type: SMALLINT
              - column:
                  name: categoryCard
                  type: SMALLINT
              - column:
                  name: createdDate
                  type: TIMESTAMP
              - column:
                  name: updatedDate
                  type: TIMESTAMP
              - column:
                  name: status
                  type: SMALLINT

  - changeSet:
      id: 003-create-cardaccounts
      author: liquibase
      changes:
        - createTable:
            tableName: CardAccounts
            columns:
              - column:
                  name: cardAccountId
                  type: BIGINT
                  autoIncrement: false
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: cardId
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: creditTotal
                  type: DECIMAL(19,2)
              - column:
                  name: debtTax
                  type: DECIMAL(19,2)
              - column:
                  name: currency
                  type: SMALLINT
              - column:
                  name: paymentDate
                  type: SMALLINT
              - column:
                  name: cardStatus
                  type: SMALLINT
              - column:
                  name: createdDate
                  type: TIMESTAMP
              - column:
                  name: updatedDate
                  type: TIMESTAMP
              - column:
                  name: status
                  type: SMALLINT



  - changeSet:
      id: 006-create-balances
      author: liquibase
      changes:
        - createTable:
            tableName: balances
            columns:
              - column:
                  name: idBalance
                  type: BIGINT
                  autoIncrement: false
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: cardId
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: SMALLINT
              - column:
                  name: totalAmount
                  type: DECIMAL(19,2)
              - column:
                  name: availableAmount
                  type: DECIMAL(19,2)
              - column:
                  name: oldAmount
                  type: DECIMAL(19,2)
              - column:
                  name: exchangeRate
                  type: DECIMAL(19,2)
              - column:
                  name: startDate
                  type: DATE
              - column:
                  name: endDate
                  type: DATE
              - column:
                  name: createdDate
                  type: TIMESTAMP
              - column:
                  name: updatedDate
                  type: TIMESTAMP
              - column:
                  name: status
                  type: SMALLINT
  - changeSet:
      id: 007-create-benefit
      author: liquibase
      changes:
        - createTable:
            tableName: Benefits
            columns:
              - column:
                  name: idBenefit
                  type: BIGINT
                  autoIncrement: false
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: cardId
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: hasDiscount
                  type: BIT
              - column:
                  name: totalPoints
                  type: INT
              - column:
                  name: multiplierPoints
                  type: DECIMAL(5,2)
              - column:
                  name: createdDate
                  type: TIMESTAMP
              - column:
                  name: updatedDate
                  type: TIMESTAMP
              - column:
                  name: status
                  type: SMALLINT

  # Foreign keys: uno por changeSet para mantener orden y poder aplicarlos/revertirlos individualmente
  - changeSet:
      id: 008-fk-cardaccounts-cardid
      author: liquibase
      changes:
        - addForeignKeyConstraint:
            baseTableName: CardAccounts
            baseColumnNames: cardId
            referencedTableName: Cards
            referencedColumnNames: cardId
            constraintName: fk_cardaccounts_cardid

  - changeSet:
      id: 011-fk-balances-cardid
      author: liquibase
      changes:
        - addForeignKeyConstraint:
            baseTableName: balances
            baseColumnNames: cardId
            referencedTableName: Cards
            referencedColumnNames: cardId
            constraintName: fk_balances_cardid

  - changeSet:
      id: 012-fk-benefits-cardid
      author: liquibase
      changes:
        - addForeignKeyConstraint:
            baseTableName: Benefits
            baseColumnNames: cardId
            referencedTableName: Cards
            referencedColumnNames: cardId
            constraintName: fk_benefits_cardid

